<svg viewBox="0 0 960 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Agent Foundry learning cycle">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <style>
      .step-circle { filter: drop-shadow(0 2px 6px rgba(0,0,0,0.10)); }
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
    </style>
  </defs>

  <!-- ── Background pill ── -->
  <rect x="4" y="30" width="952" height="130" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ── Connecting arrows ── -->
  <line x1="100" y1="95" x2="148" y2="95" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="228" y1="95" x2="276" y2="95" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="356" y1="95" x2="404" y2="95" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="484" y1="95" x2="532" y2="95" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="612" y1="95" x2="660" y2="95" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="740" y1="95" x2="788" y2="95" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="868" y1="95" x2="916" y2="95" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow labels -->
  <text x="124" y="87" text-anchor="middle" font-size="8" fill="#94a3b8" class="label">lock</text>
  <text x="252" y="87" text-anchor="middle" font-size="8" fill="#94a3b8" class="label">QA ✓</text>

  <!-- ── Loop-back arrow ── -->
  <path d="M938 95 C958 95 958 178 480 178 C2 178 2 95 22 95" stroke="#bfdbfe" stroke-width="1.5" stroke-dasharray="5 3" fill="none" marker-end="url(#arr)"/>
  <text x="480" y="192" text-anchor="middle" font-size="9" fill="#93c5fd" class="label">next cycle →</text>

  <!-- ── Node 1: Warm-Up ── -->
  <circle cx="60" cy="95" r="36" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" class="step-circle"/>
  <text x="60" y="89" text-anchor="middle" font-size="20">🧠</text>
  <text x="60" y="103" text-anchor="middle" font-size="8.5" fill="#1e40af" class="label" font-weight="600">Warm-Up</text>
  <text x="60" y="145" text-anchor="middle" font-size="8" fill="#64748b" class="label">Recap &amp; quiz</text>

  <!-- ── Node 2: Brainstorm ── -->
  <circle cx="188" cy="95" r="36" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" class="step-circle"/>
  <text x="188" y="89" text-anchor="middle" font-size="20">💭</text>
  <text x="188" y="103" text-anchor="middle" font-size="8.5" fill="#1e40af" class="label" font-weight="600">Brainstorm</text>
  <text x="188" y="145" text-anchor="middle" font-size="8" fill="#64748b" class="label">Pick your idea</text>

  <!-- ── Node 3: Generate ── -->
  <circle cx="316" cy="95" r="36" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" class="step-circle"/>
  <text x="316" y="89" text-anchor="middle" font-size="20">⚙️</text>
  <text x="316" y="103" text-anchor="middle" font-size="8.5" fill="#1e40af" class="label" font-weight="600">Generate</text>
  <text x="316" y="145" text-anchor="middle" font-size="8" fill="#64748b" class="label">Claude builds it</text>

  <!-- ── Node 4: Read Guide ── -->
  <circle cx="444" cy="95" r="36" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" class="step-circle"/>
  <text x="444" y="89" text-anchor="middle" font-size="20">📖</text>
  <text x="444" y="103" text-anchor="middle" font-size="8.5" fill="#1e40af" class="label" font-weight="600">Read Guide</text>
  <text x="444" y="145" text-anchor="middle" font-size="8" fill="#64748b" class="label">Before running</text>

  <!-- ── Node 5: Professor F ── -->
  <circle cx="572" cy="95" r="36" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" class="step-circle"/>
  <text x="572" y="89" text-anchor="middle" font-size="20">🎓</text>
  <text x="572" y="103" text-anchor="middle" font-size="8.5" fill="#0369a1" class="label" font-weight="600">Professor</text>
  <text x="572" y="145" text-anchor="middle" font-size="8" fill="#64748b" class="label">Pre-run tutor</text>

  <!-- ── Node 6: Run ── -->
  <circle cx="700" cy="95" r="36" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" class="step-circle"/>
  <text x="700" y="89" text-anchor="middle" font-size="22" fill="#166534">▶</text>
  <text x="700" y="104" text-anchor="middle" font-size="8.5" fill="#166534" class="label" font-weight="600">Run Agent</text>
  <text x="700" y="145" text-anchor="middle" font-size="8" fill="#64748b" class="label">In PyCharm</text>

  <!-- ── Node 7: Professor F2 ── -->
  <circle cx="828" cy="95" r="36" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" class="step-circle"/>
  <text x="828" y="89" text-anchor="middle" font-size="20">🎓</text>
  <text x="828" y="103" text-anchor="middle" font-size="8.5" fill="#0369a1" class="label" font-weight="600">Professor</text>
  <text x="828" y="145" text-anchor="middle" font-size="8" fill="#64748b" class="label">Post-run Q&amp;A</text>

  <!-- ── Node 8: Insights ── -->
  <circle cx="940" cy="95" r="16" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" class="step-circle"/>
  <text x="940" y="100" text-anchor="middle" font-size="14">✨</text>
</svg>
