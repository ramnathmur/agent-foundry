<svg viewBox="0 0 960 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Agent Foundry — Feynman quote banner">
  <defs>

    <!-- ── Diagonal clip paths ── -->
    <clipPath id="cl">
      <polygon points="0,0 592,0 624,280 0,280"/>
    </clipPath>
    <clipPath id="cr">
      <polygon points="592,0 960,0 960,280 624,280"/>
    </clipPath>

    <!-- ── Right panel diagonal gradient ── -->
    <linearGradient id="rg" x1="624" y1="0" x2="960" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#12243e"/>
      <stop offset="100%" stop-color="#0b1827"/>
    </linearGradient>

    <!-- ── Left accent bar ── -->
    <linearGradient id="lb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2563eb" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#3b82f6" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#3b82f6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>

    <!-- ── Divider: cool blue → warm amber ── -->
    <linearGradient id="dg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- ── Dot grid for left panel depth ── -->
    <pattern id="dl" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="0.9" fill="#3b82f6"/>
    </pattern>

    <!-- ── Dot grid for right panel depth ── -->
    <pattern id="dr" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="0.9" fill="#f59e0b"/>
    </pattern>

    <!-- ── Glow: divider line ── -->
    <filter id="fg" x="-400%" y="-5%" width="900%" height="110%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ── Glow: atom icon ── -->
    <filter id="fa" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      .q { font-family: Georgia, 'Times New Roman', serif; }
      .u { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
    </style>
  </defs>

  <!-- ════════════════════════════
       LEFT PANEL — the quote
  ════════════════════════════ -->
  <g clip-path="url(#cl)">

    <!-- Base -->
    <rect width="640" height="280" fill="#0b1320"/>
    <!-- Dot texture -->
    <rect width="640" height="280" fill="url(#dl)" opacity="0.045"/>
    <!-- Left accent bar -->
    <rect x="0" y="0" width="4" height="280" fill="url(#lb)"/>

    <!-- ── Large decorative opening curly quote mark ──
         Uses Unicode left double quotation mark (U+201C).
         Positioned behind text as a visible watermark. -->
    <text x="44" y="196" font-size="195" fill="#3b82f6" opacity="0.17" class="q">&#x201C;</text>

    <!-- Quote text — 32 px for banner-appropriate weight -->
    <text x="68" y="122" font-size="32" fill="#e8edf4" font-style="italic" class="q">What I cannot create,</text>
    <text x="68" y="162" font-size="32" fill="#e8edf4" font-style="italic" class="q">I do not understand.</text>

    <!-- Thin rule above attribution -->
    <line x1="68" y1="178" x2="232" y2="178" stroke="#3b82f6" stroke-width="0.9" opacity="0.45"/>

    <!-- Attribution -->
    <text x="68" y="198" font-size="13.5" fill="#4b5b6e" class="q">&#x2014;&#x2009;Richard Feynman</text>

  </g>

  <!-- ════════════════════════════
       DIAGONAL DIVIDER
       Blue at top → Amber at bottom
  ════════════════════════════ -->
  <line x1="592" y1="0" x2="624" y2="280"
        stroke="url(#dg)" stroke-width="2.5"
        filter="url(#fg)"/>

  <!-- ════════════════════════════
       RIGHT PANEL — project identity
  ════════════════════════════ -->
  <g clip-path="url(#cr)">

    <!-- Base + texture -->
    <rect width="960" height="280" fill="url(#rg)"/>
    <rect x="624" width="960" height="280" fill="url(#dr)" opacity="0.04"/>

    <!-- ── Atom icon ──
         Three orbital ellipses rotated 0°, 60°, 120° around the same centre.
         Drawn entirely from SVG ellipses — no external assets.
         Amber accent references physics / Feynman's Nobel-prize domain. -->
    <g transform="translate(783, 108)" filter="url(#fa)">
      <!-- Orbit 1 — equatorial -->
      <ellipse cx="0" cy="0" rx="42" ry="14"
               fill="none" stroke="#f59e0b" stroke-width="1.9" opacity="0.88"/>
      <!-- Orbit 2 — 60° -->
      <ellipse cx="0" cy="0" rx="42" ry="14"
               fill="none" stroke="#f59e0b" stroke-width="1.9" opacity="0.88"
               transform="rotate(60)"/>
      <!-- Orbit 3 — 120° -->
      <ellipse cx="0" cy="0" rx="42" ry="14"
               fill="none" stroke="#f59e0b" stroke-width="1.9" opacity="0.88"
               transform="rotate(120)"/>
      <!-- Nucleus -->
      <circle cx="0" cy="0" r="5.5" fill="#fcd34d"/>
    </g>

    <!-- Project name -->
    <text x="783" y="156" font-size="21"
          fill="#f8fafc" font-weight="700" text-anchor="middle"
          letter-spacing="1" class="u">Agent Foundry</text>

    <!-- Rule below name -->
    <line x1="733" y1="167" x2="833" y2="167"
          stroke="#f59e0b" stroke-width="0.9" opacity="0.38"/>

    <!-- Tagline — mirrors the Feynman structure -->
    <text x="783" y="188" font-size="12.5"
          fill="#fbbf24" text-anchor="middle" class="u">Build it.&#160;&#160;Understand it.</text>

  </g>
</svg>
